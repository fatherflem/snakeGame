<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venus Flytrap vs. Plastic Army Men</title>
  <style>
    html, body { margin:0; padding:0; overflow:hidden; background:#10130f; font-family:Arial,sans-serif; }
    #ui {
      position: fixed; inset: 0 auto auto 0; color: #fff; z-index: 10; padding: 10px 12px;
      text-shadow: 0 1px 2px #000; font-size: 14px; pointer-events:none;
      background: linear-gradient(180deg, rgba(0,0,0,.45), rgba(0,0,0,0)); width: 420px;
    }
    #ui .row { margin: 4px 0; }
    #ui .hearts { color:#ff6b7c; font-size:22px; letter-spacing:2px; }
    #gameOver {
      position: fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:20;
      background:rgba(0,0,0,.7); color:#fff; text-align:center; font-size:28px;
    }
    #gameOver .panel{ background:rgba(20,30,20,.92); border:2px solid #93b667; padding:24px 32px; border-radius:10px; }
  </style>
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
</head>
<body>
<div id="ui"></div>
<div id="gameOver"><div class="panel">GAME OVER<br/><small style="font-size:18px">Press R to restart</small></div></div>
<script>
(() => {
'use strict';
const rand=(a,b)=>a+Math.random()*(b-a), clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
class SoundManager{constructor(){this.ctx=null;this.muted=false;}init(){if(this.ctx)return;this.ctx=new(window.AudioContext||window.webkitAudioContext)();}
toggle(){this.muted=!this.muted;}
beep(type='sine',f1=440,f2=220,d=0.12,v=0.08){if(!this.ctx||this.muted)return;const t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=type;o.frequency.setValueAtTime(f1,t);o.frequency.exponentialRampToValueAtTime(Math.max(40,f2),t+d);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+.01);g.gain.exponentialRampToValueAtTime(0.0001,t+d);o.connect(g).connect(this.ctx.destination);o.start(t);o.stop(t+d+.02);}noise(d=0.12,v=0.05,hp=200){if(!this.ctx||this.muted)return;const sr=this.ctx.sampleRate,buf=this.ctx.createBuffer(1,Math.floor(sr*d),sr),arr=buf.getChannelData(0);for(let i=0;i<arr.length;i++)arr[i]=(Math.random()*2-1)*Math.exp(-i/arr.length*4);const src=this.ctx.createBufferSource();src.buffer=buf;const f=this.ctx.createBiquadFilter();f.type='highpass';f.frequency.value=hp;const g=this.ctx.createGain();g.gain.value=v;src.connect(f).connect(g).connect(this.ctx.destination);src.start();}
play(name){switch(name){case 'bite':this.beep('square',340,120,.09,.12);break;case 'gulp':this.beep('triangle',180,80,.14,.1);break;case 'fire':this.noise(.18,.06,450);this.beep('sawtooth',240,120,.16,.05);break;case 'poison':this.beep('sine',150,100,.25,.08);this.noise(.15,.03,120);break;case 'shoot':this.beep('square',700,300,.05,.08);break;case 'rocket':this.beep('sawtooth',160,90,.13,.09);break;case 'tank':this.beep('square',110,55,.22,.12);break;case 'boom':this.noise(.25,.12,80);break;case 'melt':this.beep('triangle',220,60,.25,.07);break;case 'damage':this.beep('square',280,120,.08,.08);break;case 'heartlost':this.beep('sine',240,100,.3,.1);break;case 'wave':this.beep('triangle',500,700,.2,.07);break;case 'gameover':this.beep('sawtooth',280,70,.5,.12);break;case 'toggle':this.beep('triangle',600,500,.08,.08);break;}}}

class Effects{constructor(scene){this.scene=scene;this.bits=[];this.mat=new THREE.MeshStandardMaterial({color:0x88bb77});}
spawnBits(pos,color=0x84a060,count=6){for(let i=0;i<count;i++){const m=new THREE.Mesh(new THREE.BoxGeometry(.12,.12,.12),new THREE.MeshStandardMaterial({color,roughness:.35,metalness:.2}));m.position.copy(pos);m.userData={v:new THREE.Vector3(rand(-2,2),rand(1,4),rand(-2,2)),t:1};this.scene.add(m);this.bits.push(m);}}
update(dt){for(let i=this.bits.length-1;i>=0;i--){const b=this.bits[i],u=b.userData;u.t-=dt;b.position.addScaledVector(u.v,dt);u.v.y-=9*dt;b.rotation.x+=dt*8;b.rotation.y+=dt*7;if(u.t<=0){this.scene.remove(b);b.material.dispose();b.geometry.dispose();this.bits.splice(i,1);}}}}

class SnatcherHead{constructor(offset){this.root=new THREE.Group();this.root.position.copy(offset);this.stem=new THREE.Mesh(new THREE.CylinderGeometry(.12,.18,1.4,8),new THREE.MeshStandardMaterial({color:0x2f8b43,roughness:.8}));this.stem.position.y=.7;this.root.add(this.stem);
this.hinge=new THREE.Group();this.hinge.position.set(0,1.35,.2);this.root.add(this.hinge);
const jawMat=new THREE.MeshStandardMaterial({color:0x4caf50,roughness:.7});const innerMat=new THREE.MeshStandardMaterial({color:0x8d1f34,roughness:.9});
const mkJaw=(up)=>{const g=new THREE.Group();const shell=new THREE.Mesh(new THREE.SphereGeometry(.55,12,8,0,Math.PI),jawMat);shell.scale.set(1,.55,1.35);shell.rotation.z=Math.PI/2;shell.rotation.y=Math.PI/2;g.add(shell);const inner=new THREE.Mesh(new THREE.SphereGeometry(.44,10,8,0,Math.PI),innerMat);inner.scale.set(1,.45,1.2);inner.position.x=up?-.03:.03;inner.rotation.copy(shell.rotation);g.add(inner);for(let i=0;i<8;i++){const t=new THREE.Mesh(new THREE.ConeGeometry(.04,.14,4),new THREE.MeshStandardMaterial({color:0xe4f3d9}));const a=(i/7-.5)*1.35;t.position.set(0,Math.sin(a)*.25,Math.cos(a)*.42);t.rotation.x=Math.PI/2+a*(up?1:-1);g.add(t);}return g;};
this.upper=mkJaw(true);this.lower=mkJaw(false);this.upper.position.z=.28;this.lower.position.z=.28;this.hinge.add(this.upper,this.lower);this.open=0.75;this.snapTimer=0;}
worldMouth(out){out.set(0,1.42,.95);return this.hinge.localToWorld(out);}
snap(){this.snapTimer=.26;}
update(dt,t,moving){const sway=Math.sin(t*3+this.root.position.x*2)*.07+(moving?.07:0);this.root.rotation.y=sway;this.root.rotation.x=Math.sin(t*2+this.root.position.z)*.06; if(this.snapTimer>0){this.snapTimer-=dt;this.open=this.snapTimer>.08?0.04:0.45;}else this.open=0.75+Math.sin(t*4+this.root.position.x)*.08;this.upper.rotation.y=-this.open;this.lower.rotation.y=this.open;}}

class VenusFlytrap{constructor(scene){this.group=new THREE.Group();this.pos=this.group.position;this.rot=0;this.speed=7;this.hearts=3;this.heartHp=100;this.hp=300;this.infinite=false;this.burstCd=0;this.fireCd=0;this.poisonCd=0;
const bodyMat=new THREE.MeshStandardMaterial({color:0x2f7d3a,roughness:.75});const body=new THREE.Mesh(new THREE.CylinderGeometry(1.4,1.9,3,10),bodyMat);body.position.y=1.5;body.castShadow=true;this.group.add(body);
for(let i=0;i<6;i++){const r=new THREE.Mesh(new THREE.CylinderGeometry(.15,.25,2.1,6),new THREE.MeshStandardMaterial({color:0x375f2f}));const a=i/6*Math.PI*2;r.position.set(Math.cos(a)*1.2,.8,Math.sin(a)*1.2);r.rotation.z=Math.sin(a)*.8;r.castShadow=true;this.group.add(r);} 
this.heads=[new SnatcherHead(new THREE.Vector3(0,2,.3)),new SnatcherHead(new THREE.Vector3(-1.2,1.7,-.2)),new SnatcherHead(new THREE.Vector3(1.2,1.7,-.2))];this.heads.forEach(h=>this.group.add(h.root));scene.add(this.group);}
update(dt,t,input,mapSize){let mx=0,mz=0;if(input['KeyW']||input['ArrowUp'])mz-=1;if(input['KeyS']||input['ArrowDown'])mz+=1;if(input['KeyA']||input['ArrowLeft'])mx-=1;if(input['KeyD']||input['ArrowRight'])mx+=1; if(input['KeyQ'])this.rot+=dt*2;if(input['KeyE'])this.rot-=dt*2;
let moving=mx||mz; if(moving){const l=Math.hypot(mx,mz);mx/=l;mz/=l;const a=Math.atan2(mx,mz)+this.rot,boost=(input['ShiftLeft']||input['ShiftRight'])&&this.burstCd<=0?2:1; if(boost>1)this.burstCd=2.2;this.pos.x+=Math.sin(a)*this.speed*boost*dt;this.pos.z+=Math.cos(a)*this.speed*boost*dt; this.rot=a;}
this.group.rotation.y=this.rot;this.pos.x=clamp(this.pos.x,-mapSize,mapSize);this.pos.z=clamp(this.pos.z,-mapSize,mapSize);this.burstCd=Math.max(0,this.burstCd-dt);this.fireCd=Math.max(0,this.fireCd-dt);this.poisonCd=Math.max(0,this.poisonCd-dt);this.heads.forEach(h=>h.update(dt,t,moving));}
damage(d,s){if(this.infinite)return;this.hp-=d;s.play('damage');const newHearts=Math.max(0,Math.ceil(this.hp/100));if(newHearts<this.hearts){this.hearts=newHearts;s.play('heartlost');}}
healSmall(){if(this.infinite)return;this.hp=Math.min(300,this.hp+10);this.hearts=Math.ceil(this.hp/100);} }

class SoldierBuilder{static materials={r:new THREE.MeshStandardMaterial({color:0x567f42,roughness:.5,metalness:.15}),d:new THREE.MeshStandardMaterial({color:0x3f5f36,roughness:.45,metalness:.3}),tank:new THREE.MeshStandardMaterial({color:0x4d6f3a,roughness:.55,metalness:.25})};
static create(type){const g=new THREE.Group(),m=this.materials.r,dm=this.materials.d;const base=new THREE.Mesh(new THREE.CylinderGeometry(.22,.22,.04,10),m);base.position.y=.02;g.add(base);
const torso=new THREE.Mesh(new THREE.BoxGeometry(.22,.34,.12),m);torso.position.y=.45;g.add(torso);const head=new THREE.Mesh(new THREE.SphereGeometry(.09,8,8),m);head.position.y=.68;g.add(head);const helmet=new THREE.Mesh(new THREE.CylinderGeometry(.1,.11,.06,8),m);helmet.position.y=.74;g.add(helmet);
const arm=(x)=>{const a=new THREE.Mesh(new THREE.CapsuleGeometry(.04,.16,3,6),m);a.position.set(x,.49,0);g.add(a);};arm(-.14);arm(.14);
const leg=(x)=>{const l=new THREE.Mesh(new THREE.CapsuleGeometry(.045,.2,3,6),m);l.position.set(x,.23,0);g.add(l);const boot=new THREE.Mesh(new THREE.BoxGeometry(.07,.03,.12),dm);boot.position.set(x,.1,.03);g.add(boot);};leg(-.06);leg(.06);
const pack=new THREE.Mesh(new THREE.BoxGeometry(.12,.16,.08),m);pack.position.set(0,.47,-.09);g.add(pack);
let weapon;
if(type==='bazooka'){weapon=new THREE.Mesh(new THREE.CylinderGeometry(.04,.04,.45,8),dm);weapon.rotation.z=Math.PI/2;weapon.position.set(.18,.5,.08);} 
else if(type==='sword'){weapon=new THREE.Group();const h=new THREE.Mesh(new THREE.CylinderGeometry(.015,.015,.18,6),dm);h.rotation.z=Math.PI/2;const b=new THREE.Mesh(new THREE.BoxGeometry(.02,.22,.01),new THREE.MeshStandardMaterial({color:0xbec6cc,metalness:.8,roughness:.2}));b.position.x=.12;b.rotation.z=Math.PI/2;weapon.add(h,b);weapon.position.set(.16,.48,.08);} 
else if(type==='axe'){weapon=new THREE.Group();const h=new THREE.Mesh(new THREE.CylinderGeometry(.014,.014,.2,6),new THREE.MeshStandardMaterial({color:0x6f4f2a}));h.rotation.z=Math.PI/2;const ah=new THREE.Mesh(new THREE.BoxGeometry(.03,.08,.06),new THREE.MeshStandardMaterial({color:0xb7c0c8,metalness:.7,roughness:.3}));ah.position.x=.08;weapon.add(h,ah);weapon.position.set(.16,.5,.08);} 
else {weapon=new THREE.Mesh(new THREE.CylinderGeometry(.015,.015,.28,6),dm);weapon.rotation.z=Math.PI/2;weapon.position.set(.16,.5,.08);} g.add(weapon);
if(type==='kneel'){g.scale.y=.88;torso.position.y=.39;head.position.y=.58;helmet.position.y=.63;}
if(type==='tank'){const t=new THREE.Group();t.add(new THREE.Mesh(new THREE.BoxGeometry(.9,.26,1.2),this.materials.tank));const turret=new THREE.Mesh(new THREE.CylinderGeometry(.25,.27,.18,10),this.materials.tank);turret.position.y=.2;t.add(turret);const c=new THREE.Mesh(new THREE.CylinderGeometry(.05,.05,.55,8),this.materials.d);c.rotation.x=Math.PI/2;c.position.set(0,.22,.45);t.add(c);for(const x of[-.45,.45]){const tr=new THREE.Mesh(new THREE.BoxGeometry(.16,.22,1.1),this.materials.d);tr.position.set(x,0,0);t.add(tr);} t.userData.cannon=c;return t;}
return g;}}
class Enemy{constructor(scene,type,pos){this.type=type;this.mesh=SoldierBuilder.create(type);this.mesh.position.copy(pos);scene.add(this.mesh);this.hp=(type==='tank'?240:type==='axe'?52:type==='sword'?40:type==='bazooka'?45:32);this.speed=(type==='sword'?4.2:type==='axe'?3.1:type==='tank'?1.6:type==='kneel'?2.2:2.8);this.range=(type==='bazooka'||type==='tank')?20:(type.includes('rifle')||type==='kneel')?13:2.2;this.reload=rand(.3,1.2);this.dead=false;this.slow=1;this.state='alive';this.meltT=0;}
update(dt,player,enemies,projectiles,sound){if(this.dead)return;const p=player.pos,d=this.mesh.position.distanceTo(p),dir=new THREE.Vector3().subVectors(p,this.mesh.position);const ang=Math.atan2(dir.x,dir.z);this.mesh.rotation.y=ang;
if(this.state!=='alive'){this.meltT-=dt; if(this.state==='melt'){this.mesh.scale.y=Math.max(.08,this.mesh.scale.y-dt*1.5);this.mesh.position.y=Math.max(.04,this.mesh.position.y-dt*.6);}else{this.mesh.rotation.z+=dt*1.6;this.mesh.position.y=Math.max(.04,this.mesh.position.y-dt*.9);} if(this.meltT<=0)this.dead=true; return;}
let desired=0;if(this.type==='sword'||this.type==='axe')desired=1;else desired=d>this.range+1?1:d<this.range-1?-1:0;const sp=this.speed*this.slow;this.mesh.position.x+=Math.sin(ang)*sp*dt*desired;this.mesh.position.z+=Math.cos(ang)*sp*dt*desired;
for(let e of enemies){if(e===this||e.dead)continue;const dd=this.mesh.position.distanceTo(e.mesh.position);if(dd<.5){const push=.25*(.5-dd);this.mesh.position.x+=Math.sin(ang+Math.PI/2)*push;this.mesh.position.z+=Math.cos(ang+Math.PI/2)*push;}}
this.reload-=dt;if(this.reload<=0&&d<=this.range+.3&&!(this.type==='sword'||this.type==='axe')){this.reload=(this.type==='tank'?2.8:this.type==='bazooka'?2.1:this.type==='kneel'?1.2:1.5);projectiles.push(new Projectile(this.mesh.position.clone().add(new THREE.Vector3(0,.55,0)),new THREE.Vector3(Math.sin(ang),0,Math.cos(ang)),this.type));sound.play(this.type==='tank'?'tank':this.type==='bazooka'?'rocket':'shoot');}
if(d<1.5){player.damage((this.type==='axe'?18:this.type==='sword'?12:this.type==='tank'?16:7)*dt,sound);} }
applyDamage(a,kind,sound){this.hp-=a;if(kind==='poison')this.slow=.6;if(this.hp<=0&&this.state==='alive'){if(kind==='fire'){this.state='melt';this.mesh.traverse(o=>{if(o.material&&o.material.color)o.material.color.offsetHSL(-.05,.1,-.2);});sound.play('melt');}else this.state='collapse';this.meltT=1.8;return true;}return false;}}
class Projectile{constructor(pos,dir,type){this.type=type;this.mesh=new THREE.Mesh(new THREE.SphereGeometry(type==='tank'?.18:type==='bazooka'?.12:.07,8,8),new THREE.MeshStandardMaterial({color:type==='tank'?0x2f2f2f:type==='bazooka'?0x553322:0x1f2f1f,emissive:0x111111}));this.mesh.position.copy(pos);this.dir=dir.normalize();this.speed=type==='tank'?12:type==='bazooka'?14:24;this.damage=type==='tank'?34:type==='bazooka'?26:8;this.life=2.8;}
update(dt,player,effects,sound){this.life-=dt;this.mesh.position.addScaledVector(this.dir,this.speed*dt);if(this.mesh.position.distanceTo(player.pos)<1.2){player.damage(this.damage,sound);effects.spawnBits(this.mesh.position,0x553322,4);sound.play('boom');this.life=0;}if(this.life<=0)return false;return true;}}
class FireBreath{constructor(scene,pos,dir){this.scene=scene;this.t=0;this.duration=.8;this.group=new THREE.Group();this.group.position.copy(pos);this.group.lookAt(pos.clone().add(dir));for(let i=0;i<16;i++){const m=new THREE.Mesh(new THREE.SphereGeometry(rand(.12,.22),6,6),new THREE.MeshStandardMaterial({color:[0xff5500,0xffaa33,0xff2222][i%3],transparent:true,opacity:.55}));m.position.set(rand(-.2,.2),rand(-.1,.2),rand(.4,3.2));this.group.add(m);}scene.add(this.group);}update(dt){this.t+=dt;this.group.children.forEach((p,i)=>{p.position.z+=dt*5*(.8+i/40);p.material.opacity=Math.max(0,.6-this.t);});if(this.t>this.duration){this.scene.remove(this.group);return false;}return true;}}
class PoisonCloud{constructor(scene,pos){this.scene=scene;this.pos=pos.clone();this.t=0;this.duration=4.8;this.group=new THREE.Group();for(let i=0;i<22;i++){const m=new THREE.Mesh(new THREE.SphereGeometry(rand(.25,.55),8,8),new THREE.MeshStandardMaterial({color:i%2?0x75cf59:0x9f59cf,transparent:true,opacity:.35}));m.position.set(rand(-1.1,1.1),rand(.1,1),rand(-1.1,1.1));this.group.add(m);}this.group.position.copy(pos);scene.add(this.group);}update(dt){this.t+=dt;const r=1+this.t*1.4;this.group.children.forEach((p,i)=>{p.position.x*=1+dt*.15;p.position.z*=1+dt*.15;p.material.opacity=Math.max(.05,.35-this.t*.06);});this.group.scale.set(r,.8+r*.2,r);if(this.t>this.duration){this.scene.remove(this.group);return false;}return true;}}
class WaveManager{constructor(){this.wave=0;}next(){this.wave++;const w=this.wave;if(w===1)return [['rifle',15]];if(w===2)return [['rifle',20],['sword',5]];if(w===3)return [['rifle',25],['sword',8],['axe',5]];if(w===4)return [['rifle',30],['sword',8],['axe',5],['bazooka',4]];if(w===5)return [['rifle',35],['sword',10],['axe',8],['bazooka',5],['tank',2]];return [['rifle',35+w*3],['sword',10+w],['axe',8+Math.floor(w*.8)],['bazooka',5+Math.floor(w*.6)],['tank',2+Math.floor((w-5)/2)]];}}

class Game{constructor(){this.scene=new THREE.Scene();this.scene.background=new THREE.Color(0x9ec7ff);this.scene.fog=new THREE.Fog(0x9ec7ff,35,115);this.cam=new THREE.PerspectiveCamera(62,innerWidth/innerHeight,.1,260);this.ren=new THREE.WebGLRenderer({antialias:true});this.ren.setSize(innerWidth,innerHeight);this.ren.shadowMap.enabled=true;document.body.appendChild(this.ren.domElement);
this.sound=new SoundManager();this.effects=new Effects(this.scene);this.keys={};this.mapSize=40;this.player=new VenusFlytrap(this.scene);this.projectiles=[];this.enemies=[];this.fireFX=[];this.poisonFX=[];this.waveMgr=new WaveManager();this.score=0;this.gameOver=false;
this.setupWorld();this.spawnWave();this.bind();this.last=performance.now();requestAnimationFrame(this.loop.bind(this));}
setupWorld(){const h=new THREE.HemisphereLight(0xdff4ff,0x556644,.75),d=new THREE.DirectionalLight(0xffffff,1.1);d.position.set(25,35,10);d.castShadow=true;this.scene.add(h,d);
const g=new THREE.Mesh(new THREE.PlaneGeometry(95,95,1,1),new THREE.MeshStandardMaterial({color:0xb89461,roughness:.95}));g.rotation.x=-Math.PI/2;g.receiveShadow=true;this.scene.add(g);
for(let i=0;i<140;i++){const m=new THREE.Mesh(new THREE.CircleGeometry(rand(.2,.7),6),new THREE.MeshStandardMaterial({color:Math.random()>.45?0x6d9e45:0x8ea95c,side:THREE.DoubleSide}));m.rotation.x=-Math.PI/2;m.position.set(rand(-43,43),.02,rand(-43,43));this.scene.add(m);} 
for(let i=0;i<28;i++){const b=new THREE.Mesh(new THREE.BoxGeometry(rand(.6,1.3),rand(.4,1),rand(.6,1.3)),new THREE.MeshStandardMaterial({color:[0xd95f5f,0x5f85d9,0xd9c15f][i%3]}));b.position.set(rand(-34,34),.25,rand(-34,34));this.scene.add(b);} 
for(let i=0;i<40;i++){const r=new THREE.Mesh(new THREE.DodecahedronGeometry(rand(.25,.6),0),new THREE.MeshStandardMaterial({color:0x777266}));r.position.set(rand(-40,40),.2,rand(-40,40));this.scene.add(r);} 
for(let i=0;i<30;i++){const s=new THREE.Mesh(new THREE.CylinderGeometry(.05,.07,rand(.8,1.8),6),new THREE.MeshStandardMaterial({color:0x7f5a35}));s.rotation.z=rand(-1,1);s.position.set(rand(-38,38),.2,rand(-38,38));this.scene.add(s);} 
const borderMat=new THREE.MeshStandardMaterial({color:0xcfae77});for(const p of [[0,47,95,1],[0,-47,95,1],[47,0,1,95],[-47,0,1,95]]){const b=new THREE.Mesh(new THREE.BoxGeometry(p[2],1,p[3]),borderMat);b.position.set(p[0],.5,p[1]);this.scene.add(b);} }
spawnWave(){const entries=this.waveMgr.next(),spawn=()=>{const side=Math.floor(Math.random()*4),r=rand(-this.mapSize,this.mapSize);if(side===0)return new THREE.Vector3(-this.mapSize,.1,r);if(side===1)return new THREE.Vector3(this.mapSize,.1,r);if(side===2)return new THREE.Vector3(r,.1,-this.mapSize);return new THREE.Vector3(r,.1,this.mapSize);};entries.forEach(([t,c])=>{for(let i=0;i<c;i++){this.enemies.push(new Enemy(this.scene,t,spawn()));}});this.sound.play('wave');}
bind(){addEventListener('resize',()=>{this.cam.aspect=innerWidth/innerHeight;this.cam.updateProjectionMatrix();this.ren.setSize(innerWidth,innerHeight);});addEventListener('keydown',e=>{this.sound.init();this.keys[e.code]=true;if(e.code==='Space')this.tryBite();if(e.code==='KeyF')this.castFire();if(e.code==='KeyC')this.castPoison();if(e.code==='KeyH'){this.player.infinite=!this.player.infinite;this.sound.play('toggle');}if(e.code==='KeyM'){this.sound.toggle();}if(e.code==='KeyR'&&this.gameOver)this.restart();});addEventListener('keyup',e=>this.keys[e.code]=false);addEventListener('click',()=>this.sound.init());}
tryBite(){if(this.gameOver)return;this.sound.play('bite');const used=new Set();for(const h of this.player.heads){h.snap();const mouth=h.worldMouth(new THREE.Vector3());let best=null,bestD=2.1;for(const e of this.enemies){if(e.dead||e.type==='tank'||used.has(e))continue;const d=e.mesh.position.distanceTo(mouth);if(d<bestD){best=e;bestD=d;}}if(best){used.add(best);best.dead=true;this.scene.remove(best.mesh);this.effects.spawnBits(best.mesh.position,0x4f7d3e,5);this.score+=12;this.player.healSmall();this.sound.play('gulp');}}
for(const e of this.enemies){if(e.dead||e.type!=='tank')continue;if(e.mesh.position.distanceTo(this.player.pos)<3.2)e.applyDamage(24,'bite',this.sound);}}
castFire(){if(this.gameOver||this.player.fireCd>0)return;this.player.fireCd=6;this.sound.play('fire');const origin=this.player.heads[0].worldMouth(new THREE.Vector3());const dir=new THREE.Vector3(Math.sin(this.player.rot),0,Math.cos(this.player.rot));this.fireFX.push(new FireBreath(this.scene,origin,dir));for(const e of this.enemies){if(e.dead)continue;const to=new THREE.Vector3().subVectors(e.mesh.position,origin);const d=to.length();if(d>9)continue;to.normalize();if(to.dot(dir)>.55){if(e.applyDamage(e.type==='tank'?28:90,'fire',this.sound))this.score+=e.type==='tank'?60:18;}}}
castPoison(){if(this.gameOver||this.player.poisonCd>0)return;this.player.poisonCd=8;this.sound.play('poison');this.poisonFX.push(new PoisonCloud(this.scene,this.player.pos.clone().add(new THREE.Vector3(0,.1,0))));}
restart(){location.reload();}
updateUI(){const hearts='❤'.repeat(this.player.hearts)+'♡'.repeat(3-this.player.hearts);document.getElementById('ui').innerHTML=`<div class='row'><b>Venus Flytrap vs. Plastic Army Men</b></div><div class='row hearts'>${hearts}</div><div class='row'>Wave: ${this.waveMgr.wave} | Score: ${this.score} | Enemies: ${this.enemies.filter(e=>!e.dead).length}</div><div class='row'>Fire CD [F]: ${this.player.fireCd.toFixed(1)}s | Poison CD [C]: ${this.player.poisonCd.toFixed(1)}s | Burst CD [Shift]: ${this.player.burstCd.toFixed(1)}s</div><div class='row'>INFINITE HEALTH [H]: <b style='color:${this.player.infinite?'#7fff96':'#ff9a9a'}'>${this.player.infinite?'ON':'OFF'}</b> | Sound [M]: ${this.sound.muted?'MUTED':'ON'}</div><div class='row'>Controls: WASD/Arrows move, Q/E rotate, Space bite, F fire breath, C poison cloud, Shift burst, R restart.</div>`;}
loop(now){const dt=Math.min(.033,(now-this.last)/1000);this.last=now;const t=now*.001;if(!this.gameOver){this.player.update(dt,t,this.keys,this.mapSize-2);
for(let i=this.projectiles.length-1;i>=0;i--){const p=this.projectiles[i];if(!p.mesh.parent)this.scene.add(p.mesh);if(!p.update(dt,this.player,this.effects,this.sound)){this.scene.remove(p.mesh);this.projectiles.splice(i,1);}}
for(let i=this.enemies.length-1;i>=0;i--){const e=this.enemies[i];e.update(dt,this.player,this.enemies,this.projectiles,this.sound);if(e.state==='alive'&&e.mesh.position.distanceTo(this.player.pos)<1.4){if(e.applyDamage(22*dt,'crush',this.sound)&&e.type!=='tank'){this.effects.spawnBits(e.mesh.position,0x5e8e4e,8);this.score+=9;}}
for(const c of this.poisonFX){if(e.state==='alive'&&e.mesh.position.distanceTo(c.group.position)<c.group.scale.x*1.1){if(e.applyDamage((e.type==='tank'?7:16)*dt,'poison',this.sound)){this.score+=e.type==='tank'?60:14;this.sound.play('poison');}}}
if(e.dead){this.scene.remove(e.mesh);this.enemies.splice(i,1);}}
for(let i=this.fireFX.length-1;i>=0;i--)if(!this.fireFX[i].update(dt))this.fireFX.splice(i,1);
for(let i=this.poisonFX.length-1;i>=0;i--)if(!this.poisonFX[i].update(dt))this.poisonFX.splice(i,1);
this.effects.update(dt);
if(this.enemies.length===0)this.spawnWave();if(this.player.hearts<=0&&!this.player.infinite){this.gameOver=true;document.getElementById('gameOver').style.display='flex';this.sound.play('gameover');}}
const follow=new THREE.Vector3(this.player.pos.x-11*Math.sin(this.player.rot),11,this.player.pos.z-11*Math.cos(this.player.rot));this.cam.position.lerp(follow,.08);this.cam.lookAt(this.player.pos.x,2.4,this.player.pos.z+1.4);
this.updateUI();this.ren.render(this.scene,this.cam);requestAnimationFrame(this.loop.bind(this));}}
new Game();
})();
</script>
