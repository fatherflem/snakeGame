<body>
<div id="ui"></div><div id="moving">Moving</div>
<div id="overlay"><div class="panel"><h2>Mutant Venus Flytrap</h2><p>Click or press any key to start.</p></div></div>

<script>
(()=>{'use strict';

class SoundManager{constructor(){this.ctx=null;this.muted=false;}init(){if(!this.ctx)this.ctx=new (window.AudioContext||window.webkitAudioContext)();}t(){this.muted=!this.muted;this.play('toggle');}
osc(type,f1,f2,d,v){if(!this.ctx||this.muted)return;const t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=type;o.frequency.setValueAtTime(f1,t);o.frequency.exponentialRampToValueAtTime(Math.max(40,f2),t+d);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+.01);g.gain.exponentialRampToValueAtTime(.0001,t+d);o.connect(g).connect(this.ctx.destination);o.start(t);o.stop(t+d+.02);}noise(d,v,hp){if(!this.ctx||this.muted)return;const sr=this.ctx.sampleRate,b=this.ctx.createBuffer(1,sr*d,sr),a=b.getChannelData(0);for(let i=0;i<a.length;i++)a[i]=(Math.random()*2-1)*Math.exp(-4*i/a.length);const s=this.ctx.createBufferSource();s.buffer=b;const f=this.ctx.createBiquadFilter();f.type='highpass';f.frequency.value=hp||120;const g=this.ctx.createGain();g.gain.value=v;s.connect(f).connect(g).connect(this.ctx.destination);s.start();}
play(n){if(n==='snap')this.osc('square',420,90,.09,.12);if(n==='gulp')this.osc('triangle',150,70,.16,.11);if(n==='fire'){this.noise(.3,.08,380);this.osc('sawtooth',240,90,.28,.06);}if(n==='poison'){this.osc('sine',160,70,.3,.08);this.noise(.2,.04,70);}if(n==='rifle')this.osc('square',740,260,.05,.09);if(n==='bazooka')this.osc('sawtooth',170,70,.14,.1);if(n==='tank')this.osc('square',105,50,.25,.13);if(n==='boom')this.noise(.35,.14,50);if(n==='melt')this.osc('triangle',230,55,.22,.08);if(n==='heart')this.osc('sine',240,95,.3,.1);if(n==='wave')this.osc('triangle',470,760,.24,.08);if(n==='gameover')this.osc('sawtooth',280,65,.48,.12);if(n==='toggle')this.osc('triangle',650,540,.09,.08);}}
class Effects{constructor(scene){this.scene=scene;this.p=[];}dust(pos){const m=new THREE.Mesh(new THREE.SphereGeometry(.12,6,6),new THREE.MeshStandardMaterial({color:0xb48b57,transparent:true,opacity:.55}));m.position.copy(pos);m.position.y=.08;m.userData={v:new THREE.Vector3(rand(-.6,.6),rand(.25,.7),rand(-.6,.6)),t:.42};this.scene.add(m);this.p.push(m);}bits(pos,c,n){for(let i=0;i<n;i++){const m=new THREE.Mesh(new THREE.BoxGeometry(.1,.1,.1),new THREE.MeshStandardMaterial({color:c,roughness:.45,metalness:.2}));m.position.copy(pos);m.userData={v:new THREE.Vector3(rand(-2,2),rand(1,4),rand(-2,2)),t:1.2};this.scene.add(m);this.p.push(m);}}update(dt){for(let i=this.p.length-1;i>=0;i--){const e=this.p[i],u=e.userData;u.t-=dt;e.position.addScaledVector(u.v,dt);u.v.y-=6*dt;if(e.material.opacity!==undefined)e.material.opacity=Math.max(0,u.t*1.5);if(u.t<=0){this.scene.remove(e);this.p.splice(i,1);}}}}
class SnatcherHead{constructor(off,s){this.root=new THREE.Group();this.root.position.copy(off);this.scale=s||1;const stem=new THREE.Mesh(new THREE.CylinderGeometry(.15,.26,1.9,12),new THREE.MeshStandardMaterial({color:0x2f7f45,roughness:.7}));stem.position.y=.95;stem.castShadow=true;this.root.add(stem);this.hinge=new THREE.Group();this.hinge.position.set(0,1.9,.25);this.root.add(this.hinge);
const jaw=(up)=>{const g=new THREE.Group(),outer=new THREE.Mesh(new THREE.SphereGeometry(.86,18,12,0,Math.PI),new THREE.MeshStandardMaterial({color:0x47a85a,roughness:.53,metalness:.06})),inner=new THREE.Mesh(new THREE.SphereGeometry(.73,16,10,0,Math.PI),new THREE.MeshStandardMaterial({color:0x8d1d34,roughness:.2,metalness:.35}));outer.scale.set(1,.6,1.45);outer.rotation.set(0,Math.PI/2,Math.PI/2);inner.scale.set(1,.55,1.3);inner.rotation.copy(outer.rotation);inner.position.x=up?-.03:.03;g.add(outer,inner);for(let i=0;i<12;i++){const t=new THREE.Mesh(new THREE.ConeGeometry(.045,.17,4),new THREE.MeshStandardMaterial({color:0xf4f6df,roughness:.5}));const a=(i/11-.5)*1.6;t.position.set(0,Math.sin(a)*.35,Math.cos(a)*.56);t.rotation.x=Math.PI/2+a*(up?1:-1);g.add(t);}return g};this.u=jaw(true);this.l=jaw(false);this.hinge.add(this.u,this.l);this.root.scale.setScalar(this.scale);this.snapT=0;this.open=.8;}
worldMouth(out){out.set(0,.2,1.23);return this.hinge.localToWorld(out);}snap(){this.snapT=.28;}update(dt,t,m){this.root.rotation.x=Math.sin(t*1.6+this.root.position.x)*.06;this.root.rotation.y=Math.sin(t*2.4+this.root.position.z)*.1+(m?.07:0);if(this.snapT>0){this.snapT-=dt;this.open=this.snapT>.1?.06:.45;}else this.open=.78+Math.sin(t*4.2+this.root.position.x)*.06;this.u.rotation.y=-this.open;this.l.rotation.y=this.open;}}
class VenusFlytrap{constructor(scene,e){this.group=new THREE.Group();this.pos=this.group.position;this.vel=new THREE.Vector3();this.rot=0;this.maxSpeed=11;this.accel=50;this.drag=13;this.hearts=3;this.hp=300;this.infinite=false;this.fireCd=0;this.poisonCd=0;this.burstCd=0;this.effects=e;const stalk=new THREE.Mesh(new THREE.CylinderGeometry(1.3,2.1,4.1,16),new THREE.MeshStandardMaterial({color:0x2f7537,roughness:.6,metalness:.05}));stalk.position.y=2.1;stalk.castShadow=true;this.group.add(stalk);
this.roots=[];for(let i=0;i<8;i++){const r=new THREE.Mesh(new THREE.CylinderGeometry(.11,.2,2.7,8),new THREE.MeshStandardMaterial({color:0x3f6534,roughness:.8}));const a=i*Math.PI/4;r.position.set(Math.cos(a)*1.4,1.1,Math.sin(a)*1.4);r.rotation.z=Math.sin(a)*.8;r.castShadow=true;this.group.add(r);this.roots.push(r);}this.heads=[new SnatcherHead(new THREE.Vector3(0,2.6,.5),1.24),new SnatcherHead(new THREE.Vector3(-1.8,2.3,.1),1.0),new SnatcherHead(new THREE.Vector3(1.8,2.3,.1),1.0)];this.heads[1].root.rotation.y=.45;this.heads[2].root.rotation.y=-.45;this.heads.forEach(h=>this.group.add(h.root));const sh=new THREE.Mesh(new THREE.CircleGeometry(2.2,24),new THREE.MeshStandardMaterial({color:0x000000,transparent:true,opacity:.26}));sh.rotation.x=-Math.PI/2;sh.position.y=.03;this.group.add(sh);scene.add(this.group);}
update(dt,t,keys,map,camYaw){let ix=0,iz=0;if(keys.KeyW||keys.ArrowUp)iz-=1;if(keys.KeyS||keys.ArrowDown)iz+=1;if(keys.KeyA||keys.ArrowLeft)ix-=1;if(keys.KeyD||keys.ArrowRight)ix+=1;const moving=(ix||iz);if(moving){const l=Math.hypot(ix,iz);ix/=l;iz/=l;const f=new THREE.Vector3(Math.sin(camYaw),0,Math.cos(camYaw)),r=new THREE.Vector3(f.z,0,-f.x),dir=new THREE.Vector3().addScaledVector(r,ix).addScaledVector(f,iz).normalize();let speed=this.maxSpeed;if((keys.ShiftLeft||keys.ShiftRight)&&this.burstCd<=0){speed*=1.6;this.burstCd=3;}this.vel.addScaledVector(dir,this.accel*dt);if(this.vel.length()>speed)this.vel.setLength(speed);this.rot=Math.atan2(this.vel.x,this.vel.z);}else{const d=Math.exp(-this.drag*dt);this.vel.multiplyScalar(d);if(this.vel.length()<.01)this.vel.set(0,0,0);}this.pos.addScaledVector(this.vel,dt);this.pos.x=clamp(this.pos.x,-map,map);this.pos.z=clamp(this.pos.z,-map,map);this.group.rotation.y=this.rot;
const bob=(moving?1:0)*Math.sin(t*11)*.09;this.group.position.y=bob;for(let i=0;i<this.roots.length;i++){this.roots[i].rotation.x=Math.sin(t*8+i)*.08*(moving?1:0.35);if(moving&&Math.random()<dt*16)this.effects.dust(this.group.localToWorld(new THREE.Vector3(this.roots[i].position.x,.05,this.roots[i].position.z)));}this.heads.forEach(h=>h.update(dt,t,moving));this.fireCd=Math.max(0,this.fireCd-dt);this.poisonCd=Math.max(0,this.poisonCd-dt);this.burstCd=Math.max(0,this.burstCd-dt);return !!moving;}
damage(d,s){if(this.infinite)return;this.hp-=d;const h=Math.max(0,Math.ceil(this.hp/100));if(h<this.hearts){this.hearts=h;s.play('heart');}}}
class SoldierBuilder{static mats={g:new THREE.MeshStandardMaterial({color:0x577f45,roughness:.38,metalness:.18}),d:new THREE.MeshStandardMaterial({color:0x3c5632,roughness:.42,metalness:.3}),m:new THREE.MeshStandardMaterial({color:0xb6c0c7,metalness:.85,roughness:.25})};
static create(type){if(type==='tank'){const t=new THREE.Group(),m=this.mats.g,d=this.mats.d;t.add(new THREE.Mesh(new THREE.BoxGeometry(1,.28,1.35),m));for(const x of[-.45,.45]){const tr=new THREE.Mesh(new THREE.BoxGeometry(.2,.22,1.18),d);tr.position.set(x,-.03,0);t.add(tr);}const tur=new THREE.Mesh(new THREE.CylinderGeometry(.28,.3,.2,12),m);tur.position.y=.2;t.add(tur);const can=new THREE.Mesh(new THREE.CylinderGeometry(.05,.05,.74,8),d);can.rotation.x=Math.PI/2;can.position.set(0,.24,.58);t.add(can);return t;}const g=new THREE.Group(),m=this.mats.g,d=this.mats.d;g.add(new THREE.Mesh(new THREE.CylinderGeometry(.2,.2,.04,10)));const torso=new THREE.Mesh(new THREE.BoxGeometry(.22,.35,.12),m);torso.position.y=.45;g.add(torso);const neck=new THREE.Mesh(new THREE.CylinderGeometry(.03,.03,.05,8),m);neck.position.y=.62;g.add(neck);const head=new THREE.Mesh(new THREE.SphereGeometry(.09,10,10),m);head.position.y=.69;g.add(head);const helmet=new THREE.Mesh(new THREE.CylinderGeometry(.1,.11,.07,10),m);helmet.position.y=.76;g.add(helmet);
for(const x of[-.14,.14]){const up=new THREE.Mesh(new THREE.CapsuleGeometry(.035,.12,4,8),m);up.position.set(x,.52,0);g.add(up);const lo=new THREE.Mesh(new THREE.CapsuleGeometry(.03,.1,4,8),m);lo.position.set(x*.95,.42,.03);g.add(lo);const hand=new THREE.Mesh(new THREE.SphereGeometry(.025,8,8),m);hand.position.set(x*.9,.35,.07);g.add(hand);}for(const x of[-.06,.06]){const leg=new THREE.Mesh(new THREE.CapsuleGeometry(.04,.2,4,8),m);leg.position.set(x,.24,0);g.add(leg);const boot=new THREE.Mesh(new THREE.BoxGeometry(.07,.03,.12),d);boot.position.set(x,.1,.03);g.add(boot);}const pack=new THREE.Mesh(new THREE.BoxGeometry(.12,.16,.08),m);pack.position.set(0,.47,-.09);g.add(pack);
const w=new THREE.Group();if(type==='bazooka'){const b=new THREE.Mesh(new THREE.CylinderGeometry(.04,.045,.47,10),d);b.rotation.z=Math.PI/2;w.add(b);}else if(type==='sword'){const h=new THREE.Mesh(new THREE.CylinderGeometry(.012,.012,.2,8),d),bl=new THREE.Mesh(new THREE.BoxGeometry(.02,.23,.01),this.mats.m);h.rotation.z=Math.PI/2;bl.position.x=.12;bl.rotation.z=Math.PI/2;w.add(h,bl);}else if(type==='axe'){const h=new THREE.Mesh(new THREE.CylinderGeometry(.012,.012,.2,8),new THREE.MeshStandardMaterial({color:0x78532f})),ax=new THREE.Mesh(new THREE.BoxGeometry(.04,.09,.05),this.mats.m);h.rotation.z=Math.PI/2;ax.position.x=.08;w.add(h,ax);}else{const r=new THREE.Mesh(new THREE.CylinderGeometry(.013,.013,.3,8),d);r.rotation.z=Math.PI/2;w.add(r);}w.position.set(.16,.5,.08);g.add(w);if(type==='kneeling')g.scale.y=.84;return g;}}
class Enemy{constructor(scene,type,p){this.type=type;this.mesh=SoldierBuilder.create(type);this.mesh.position.copy(p);this.mesh.traverse(o=>o.castShadow=true);scene.add(this.mesh);this.hp=type==='tank'?240:44;this.dead=false;this.state='alive';this.life=0;this.reload=rand(.5,1.8);}update(dt,player,projectiles,snd){if(this.dead)return;const to=new THREE.Vector3().subVectors(player.pos,this.mesh.position),d=to.length();const a=Math.atan2(to.x,to.z);this.mesh.rotation.y=a;let sp=this.type==='tank'?1.4:(this.type==='sword'?4.1:2.6);if(this.state==='poison')sp*=.5;if(this.state==='alive'){if(d>(this.type==='tank'?16:2.2)){this.mesh.position.x+=Math.sin(a)*sp*dt;this.mesh.position.z+=Math.cos(a)*sp*dt;}if(d<1.55)player.damage((this.type==='tank'?16:8)*dt,snd);this.reload-=dt;if(this.reload<=0&&d<(this.type==='tank'?20:14)&&!(this.type==='sword'||this.type==='axe')){this.reload=this.type==='tank'?2.6:this.type==='bazooka'?2.1:1.3;projectiles.push(new Projectile(this.mesh.position.clone().add(new THREE.Vector3(0,.55,0)),new THREE.Vector3(Math.sin(a),0,Math.cos(a)),this.type));snd.play(this.type==='tank'?'tank':this.type==='bazooka'?'bazooka':'rifle');}}else{this.life-=dt;if(this.state==='melt'){this.mesh.scale.y=Math.max(.06,this.mesh.scale.y-dt*1.4);this.mesh.position.y=Math.max(.03,this.mesh.position.y-dt*.6);}if(this.state==='poison'){this.mesh.rotation.z+=Math.sin(performance.now()*.02)*.02;this.mesh.position.y=Math.max(.03,this.mesh.position.y-dt*.7);}if(this.life<=0)this.dead=true;}}
kill(kind,snd){if(this.state!=='alive')return false;this.state=kind;this.life=2;this.mesh.traverse(o=>{if(o.material&&o.material.color){if(kind==='melt'){o.material.color.offsetHSL(-.07,.1,-.25);o.material.metalness=.5;}if(kind==='poison')o.material.color.offsetHSL(.08,.08,-.06);}});snd.play(kind==='melt'?'melt':'poison');return true;}}
class Projectile{constructor(p,d,t){this.type=t;this.mesh=new THREE.Mesh(new THREE.SphereGeometry(t==='tank'?.18:.08,8,8),new THREE.MeshStandardMaterial({color:t==='tank'?0x352d2a:0x1d2f1d}));this.mesh.position.copy(p);this.dir=d.normalize();this.speed=t==='tank'?12:t==='bazooka'?14:22;this.damage=t==='tank'?34:t==='bazooka'?25:7;this.life=2.8;}update(dt,player,snd,fx){this.life-=dt;this.mesh.position.addScaledVector(this.dir,this.speed*dt);if(this.mesh.position.distanceTo(player.pos)<1.15){player.damage(this.damage,snd);fx.bits(this.mesh.position,0x553522,5);snd.play('boom');this.life=0;}return this.life>0;}}
class FireBreath{constructor(scene,pos,dir){this.scene=scene;this.group=new THREE.Group();this.group.position.copy(pos);this.group.lookAt(pos.clone().add(dir));this.t=0;this.light=new THREE.PointLight(0xff7a2d,1.4,14);this.light.position.set(0,.2,2);this.group.add(this.light);for(let i=0;i<24;i++){const p=new THREE.Mesh(new THREE.SphereGeometry(rand(.12,.28),6,6),new THREE.MeshStandardMaterial({color:[0xff521f,0xffc24a,0xff2d1f][i%3],transparent:true,opacity:.56}));p.position.set(rand(-.5,.5),rand(-.25,.35),rand(.6,4.5));this.group.add(p);}scene.add(this.group);}update(dt){this.t+=dt;this.group.children.forEach(c=>{if(c.isMesh){c.position.z+=dt*7;c.material.opacity=Math.max(0,.56-this.t*.7);}});if(this.t>1){this.scene.remove(this.group);return false;}return true;}}
class PoisonCloud{constructor(scene,pos){this.scene=scene;this.group=new THREE.Group();this.group.position.copy(pos);this.light=new THREE.PointLight(0x7cff65,.7,12);this.group.add(this.light);this.t=0;for(let i=0;i<26;i++){const p=new THREE.Mesh(new THREE.SphereGeometry(rand(.25,.58),8,8),new THREE.MeshStandardMaterial({color:i%2?0x73ff7a:0x9860d9,transparent:true,opacity:.32}));p.position.set(rand(-1.2,1.2),rand(.1,1.1),rand(-1.2,1.2));this.group.add(p);}scene.add(this.group);}update(dt){this.t+=dt;const s=1+this.t*1.2;this.group.scale.set(s,.85+s*.2,s);this.group.children.forEach(c=>{if(c.isMesh)c.material.opacity=Math.max(.04,.32-this.t*.055)});if(this.t>5){this.scene.remove(this.group);return false;}return true;}}
class Game{constructor(){this.scene=new THREE.Scene();this.scene.background=new THREE.Color(0x9ec6f2);this.scene.fog=new THREE.Fog(0x9ec6f2,50,170);this.camera=new THREE.PerspectiveCamera(62,innerWidth/innerHeight,.1,400);this.renderer=new THREE.WebGLRenderer({antialias:true});this.renderer.setSize(innerWidth,innerHeight);this.renderer.shadowMap.enabled=true;document.body.appendChild(this.renderer.domElement);this.keys={};this.sound=new SoundManager();this.effects=new Effects(this.scene);this.projectiles=[];this.enemies=[];this.fire=[];this.poison=[];this.wave=0;this.score=0;this.started=false;this.gameOver=false;this.camYaw=0;this.map=70;this.setupWorld();this.player=new VenusFlytrap(this.scene,this.effects);this.spawnWave();this.bind();this.last=performance.now();requestAnimationFrame(this.loop.bind(this));}
tex(c1,c2){const cv=document.createElement('canvas');cv.width=cv.height=256;const x=cv.getContext('2d');x.fillStyle=c1;x.fillRect(0,0,256,256);for(let i=0;i<4000;i++){const g=Math.floor(rand(0,45));x.fillStyle=`rgba(${g},${g+20},${g-10},${rand(.06,.22)})`;x.fillRect(rand(0,256),rand(0,256),2,2);}const t=new THREE.CanvasTexture(cv);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(16,16);return t;}
setupWorld(){this.scene.add(new THREE.HemisphereLight(0xf2e8d0,0x4f5d42,.82));const sun=new THREE.DirectionalLight(0xfff0cc,1.25);sun.position.set(40,58,20);sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);this.scene.add(sun);const g=new THREE.Mesh(new THREE.PlaneGeometry(180,180),new THREE.MeshStandardMaterial({map:this.tex('#8d7048','#9e8157'),roughness:.97}));g.rotation.x=-Math.PI/2;g.receiveShadow=true;this.scene.add(g);
for(let i=0;i<300;i++){const cl=new THREE.Mesh(new THREE.ConeGeometry(rand(.05,.16),rand(.2,.6),5),new THREE.MeshStandardMaterial({color:Math.random()>.4?0x618f43:0x739f52,roughness:.85}));cl.position.set(rand(-85,85),.12,rand(-85,85));cl.rotation.y=rand(0,6.28);this.scene.add(cl);}for(let i=0;i<80;i++){const r=new THREE.Mesh(new THREE.DodecahedronGeometry(rand(.24,.7),0),new THREE.MeshStandardMaterial({color:0x7a756d,roughness:.9}));r.position.set(rand(-80,80),.25,rand(-80,80));this.scene.add(r);}for(let i=0;i<40;i++){const b=new THREE.Mesh(new THREE.BoxGeometry(rand(.9,1.7),rand(.6,1.4),rand(.9,1.7)),new THREE.MeshStandardMaterial({color:[0xdd625e,0x5f87db,0xddc45a,0x67c9cc][i%4],roughness:.45,metalness:.08}));b.position.set(rand(-72,72),.4,rand(-72,72));this.scene.add(b);}for(let i=0;i<45;i++){const st=new THREE.Mesh(new THREE.CylinderGeometry(.04,.06,rand(1,2),6),new THREE.MeshStandardMaterial({color:0x7f5a35}));st.position.set(rand(-75,75),.2,rand(-75,75));st.rotation.z=rand(-1,1);this.scene.add(st);}for(const p of [[0,88,180,2],[0,-88,180,2],[88,0,2,180],[-88,0,2,180]]){const w=new THREE.Mesh(new THREE.BoxGeometry(p[2],1.2,p[3]),new THREE.MeshStandardMaterial({color:0xcca56f}));w.position.set(p[0],.6,p[1]);this.scene.add(w);} }
spawnWave(){this.wave++;const n=20+(this.wave-1)*8;const types=['rifle','kneeling','bazooka','sword','axe','tank'];for(let i=0;i<n;i++){const t=types[Math.min(types.length-1,Math.floor((i/n)*types.length))];const side=Math.floor(Math.random()*4),r=rand(-this.map,this.map);const p=side===0?new THREE.Vector3(-this.map,.05,r):side===1?new THREE.Vector3(this.map,.05,r):side===2?new THREE.Vector3(r,.05,-this.map):new THREE.Vector3(r,.05,this.map);this.enemies.push(new Enemy(this.scene,t,p));}this.sound.play('wave');}
bind(){addEventListener('resize',()=>{this.camera.aspect=innerWidth/innerHeight;this.camera.updateProjectionMatrix();this.renderer.setSize(innerWidth,innerHeight);});addEventListener('keydown',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault();this.keys[e.code]=true;if(!this.started){this.start();}if(e.code==='Space')this.bite();if(e.code==='KeyF')this.castFire();if(e.code==='KeyC')this.castPoison();if(e.code==='KeyH')this.player.infinite=!this.player.infinite;if(e.code==='KeyM')this.sound.t();if(e.code==='KeyR'&&this.gameOver)location.reload();});addEventListener('keyup',e=>this.keys[e.code]=false);addEventListener('click',()=>this.start());}
start(){if(this.started)return;this.started=true;this.sound.init();document.getElementById('overlay').style.display='none';this.renderer.domElement.focus&&this.renderer.domElement.focus();}
bite(){if(!this.started||this.gameOver)return;this.sound.play('snap');for(const h of this.player.heads){h.snap();const m=h.worldMouth(new THREE.Vector3());for(const e of this.enemies){if(e.dead||e.type==='tank'||e.state!=='alive')continue;if(e.mesh.position.distanceTo(m)<2.1){e.dead=true;this.scene.remove(e.mesh);this.score+=14;this.effects.bits(m,0x4f8343,7);this.sound.play('gulp');break;}}}}
castFire(){if(!this.started||this.gameOver||this.player.fireCd>0)return;this.player.fireCd=6;this.sound.play('fire');const o=this.player.heads[0].worldMouth(new THREE.Vector3()),d=new THREE.Vector3(Math.sin(this.player.rot),0,Math.cos(this.player.rot));this.fire.push(new FireBreath(this.scene,o,d));for(const e of this.enemies){if(e.state!=='alive')continue;const v=new THREE.Vector3().subVectors(e.mesh.position,o);if(v.length()<10&&v.normalize().dot(d)>.48){e.kill('melt',this.sound);this.score+=e.type==='tank'?60:20;}}}
castPoison(){if(!this.started||this.gameOver||this.player.poisonCd>0)return;this.player.poisonCd=8;this.sound.play('poison');this.poison.push(new PoisonCloud(this.scene,this.player.pos.clone()));}
ui(moving){document.getElementById('moving').style.opacity=moving?1:0;document.getElementById('ui').innerHTML=`<div><b>Mutant Flytrap Battlefield</b></div><div class='hearts'>${'♥ '.repeat(this.player.hearts)}${'♡ '.repeat(3-this.player.hearts)}</div><div>Wave: ${this.wave} | Score: ${this.score} | Enemies remaining: ${this.enemies.filter(e=>!e.dead).length}</div><div>Fire [F]: ${this.player.fireCd.toFixed(1)}s | Poison [C]: ${this.player.poisonCd.toFixed(1)}s | Speed burst [Shift]: ${this.player.burstCd.toFixed(1)}s</div><div style='color:${this.player.infinite?'#92ff98':'#ff9b9b'}'>INFINITE HEALTH: ${this.player.infinite?'ON':'OFF'} [H]</div><div>Sound [M]: ${this.sound.muted?'MUTED':'ON'} | Controls: WASD/Arrows move, Q/E camera rotate, Space bite.</div>`;}
loop(ts){const dt=Math.min(.033,(ts-this.last)/1000);this.last=ts;if(this.started&&!this.gameOver){if(this.keys.KeyQ)this.camYaw+=dt*1.7;if(this.keys.KeyE)this.camYaw-=dt*1.7;const moving=this.player.update(dt,ts*.001,this.keys,this.map-2,this.camYaw);
for(let i=this.projectiles.length-1;i>=0;i--){const p=this.projectiles[i];if(!p.mesh.parent)this.scene.add(p.mesh);if(!p.update(dt,this.player,this.sound,this.effects)){this.scene.remove(p.mesh);this.projectiles.splice(i,1);}}
for(const e of this.enemies){if(e.dead)continue;e.update(dt,this.player,this.projectiles,this.sound);if(e.state==='alive'&&e.mesh.position.distanceTo(this.player.pos)<1.4){e.kill('crush',this.sound);this.effects.bits(e.mesh.position,0x5b8f49,8);this.score+=8;}for(const c of this.poison){if(e.state==='alive'&&e.mesh.position.distanceTo(c.group.position)<c.group.scale.x*1.2){e.hp-=16*dt;e.state='poison';if(e.hp<=0){e.kill('poison',this.sound);this.score+=16;}}}}
for(let i=this.fire.length-1;i>=0;i--)if(!this.fire[i].update(dt))this.fire.splice(i,1);for(let i=this.poison.length-1;i>=0;i--)if(!this.poison[i].update(dt))this.poison.splice(i,1);this.effects.update(dt);this.enemies=this.enemies.filter(e=>{if(e.dead&&e.mesh.parent)this.scene.remove(e.mesh);return !e.dead;});if(this.enemies.length===0)this.spawnWave();if(this.player.hearts<=0&&!this.player.infinite){this.gameOver=true;document.getElementById('gameOver').style.display='flex';this.sound.play('gameover');}
this.ui(moving);}const target=new THREE.Vector3(this.player.pos.x-14*Math.sin(this.camYaw),9.5,this.player.pos.z-14*Math.cos(this.camYaw));this.camera.position.lerp(target,.08);this.camera.lookAt(this.player.pos.x,3.1,this.player.pos.z+1.2);this.renderer.render(this.scene,this.camera);requestAnimationFrame(this.loop.bind(this));}}
new Game();
})();
