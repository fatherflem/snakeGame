<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garden Titan: Snake vs. Plastic Army Men</title>
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <style>
    html, body { margin:0; overflow:hidden; background:#0f1114; font-family:Segoe UI,Arial,sans-serif; }
    #hud { position:fixed; left:12px; top:12px; color:#e6f4e6; background:rgba(0,0,0,.45); padding:10px 12px; border:1px solid #5f7; border-radius:8px; font-size:13px; line-height:1.4; z-index:5; min-width:300px }
    #waveMsg { position:fixed; left:50%; top:18%; transform:translateX(-50%); color:#fff7c1; font-size:30px; text-shadow:0 2px 6px #000; z-index:6; }
    #over { position:fixed; inset:0; display:none; place-items:center; background:rgba(0,0,0,.66); color:#fff; z-index:7; text-align:center; }
    #over .box{ background:rgba(10,10,10,.8); border:1px solid #f66; padding:20px 26px; border-radius:12px; }
  </style>
</head>
<body>
<div id="hud"></div>
<div id="waveMsg"></div>
<div id="over"><div class="box"><h1>GAME OVER</h1><p>Press R to restart</p></div></div>
<script>

class SoundManager {
  constructor(){ this.ctx=null; this.master=null; this.muted=false; }
  init(){ if(this.ctx) return; this.ctx=new (window.AudioContext||window.webkitAudioContext)(); this.master=this.ctx.createGain(); this.master.gain.value=.2; this.master.connect(this.ctx.destination); }
  toggleMute(){ this.muted=!this.muted; if(this.master) this.master.gain.value=this.muted?0:.2; }
  beep(type='sine',f1=200,f2=100,d=.1,v=.2){ if(!this.ctx||this.muted)return; const t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain(); o.type=type;o.frequency.setValueAtTime(f1,t);o.frequency.exponentialRampToValueAtTime(Math.max(30,f2),t+d);g.gain.setValueAtTime(.001,t);g.gain.exponentialRampToValueAtTime(v,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g).connect(this.master);o.start(t);o.stop(t+d+.02); }
  noise(d=.12,v=.15){ if(!this.ctx||this.muted)return; const len=this.ctx.sampleRate*d,b=this.ctx.createBuffer(1,len,this.ctx.sampleRate),arr=b.getChannelData(0); for(let i=0;i<len;i++)arr[i]=Math.random()*2-1; const s=this.ctx.createBufferSource(); s.buffer=b; const f=this.ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=1200; const g=this.ctx.createGain(); const t=this.ctx.currentTime; g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(.001,t+d); s.connect(f).connect(g).connect(this.master); s.start(); }
  bite(){this.beep('triangle',240,80,.16,.25)} gulp(){this.beep('sine',120,50,.2,.2)} fire(){this.noise(.08,.08);this.beep('sawtooth',280,160,.06,.08)}
  shoot(){this.beep('square',900,260,.05,.08)} rocket(){this.beep('sawtooth',180,70,.25,.14)} cannon(){this.noise(.25,.22);this.beep('square',120,50,.18,.18)}
  explosion(){this.noise(.2,.18)} melt(){this.beep('triangle',500,120,.22,.12)} damage(){this.beep('square',320,170,.09,.12)} wave(){this.beep('sine',440,660,.3,.1)} over(){this.beep('sawtooth',220,50,.6,.2)} toggle(){this.beep('triangle',700,350,.08,.08)}
}

class Effects {
  constructor(scene){ this.scene=scene; this.p=[]; }
  spawn(pos,c,n=6,s=.2,life=.6){ for(let i=0;i<n;i++){ const m=new THREE.Mesh(new THREE.SphereGeometry(s*.6,5,4),new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:.5,transparent:true,opacity:.9})); m.position.copy(pos); m.v=new THREE.Vector3((Math.random()-.5)*7,Math.random()*4,(Math.random()-.5)*7); m.life=life*(.6+Math.random()*.7); this.scene.add(m); this.p.push(m);} }
  update(dt){ for(let i=this.p.length-1;i>=0;i--){ const m=this.p[i]; m.life-=dt; m.position.addScaledVector(m.v,dt); m.v.y-=9*dt; m.material.opacity=Math.max(0,m.life); m.scale.multiplyScalar(1-dt*.2); if(m.life<=0){this.scene.remove(m); m.geometry.dispose(); m.material.dispose(); this.p.splice(i,1);} } if(this.p.length>350){const m=this.p.shift(); this.scene.remove(m);} }
}

class SoldierBuilder { static mats={};
  static mat(k,c){ if(!this.mats[k]) this.mats[k]=new THREE.MeshStandardMaterial({color:c,roughness:.45,metalness:.15}); return this.mats[k]; }
  static build(type='rifle'){
    if(type==='tank'){ const g=new THREE.Group(); const m=this.mat('tank',0x507252); const b=new THREE.Mesh(new THREE.BoxGeometry(1.8,.45,2.2),m); b.position.y=.28; const t1=new THREE.Mesh(new THREE.BoxGeometry(.35,.35,2.3),m),t2=t1.clone(); t1.position.set(.85,.2,0);t2.position.set(-.85,.2,0); const tur=new THREE.Mesh(new THREE.CylinderGeometry(.5,.6,.35,8),m); tur.position.y=.58; const can=new THREE.Mesh(new THREE.CylinderGeometry(.1,.12,1.6,8),m); can.rotation.z=Math.PI/2; can.position.set(0,.6,1); g.add(b,t1,t2,tur,can); return g; }
    const g=new THREE.Group(); const tone=type==='bazooka'?0x4e7c4e:type==='sword'?0x5e8c5e:type==='axe'?0x4f6f4f:0x537c53; const m=this.mat('s'+tone,tone), d=this.mat('dark',0x2f4f2f);
    const base=Math.random()<.35?new THREE.Mesh(new THREE.CylinderGeometry(.32,.34,.06,12),this.mat('base',0x456645)):null; if(base){base.position.y=.03;g.add(base);}
    const torso=new THREE.Mesh(new THREE.BoxGeometry(.34,.44,.2),m); torso.position.y=.52;
    const head=new THREE.Mesh(new THREE.SphereGeometry(.12,10,8),m); head.position.y=.85;
    const helm=new THREE.Mesh(new THREE.CylinderGeometry(.13,.14,.08,10),d); helm.position.y=.93;
    const pack=new THREE.Mesh(new THREE.BoxGeometry(.16,.2,.08),d); pack.position.set(0,.5,-.14);
    const legL=new THREE.Mesh(new THREE.BoxGeometry(.11,.32,.11),m), legR=legL.clone(); legL.position.set(-.08,.22,0); legR.position.set(.08,.22,0);
    const bootL=new THREE.Mesh(new THREE.BoxGeometry(.13,.07,.17),d),bootR=bootL.clone(); bootL.position.set(-.08,.05,.03);bootR.position.set(.08,.05,.03);
    const armL=new THREE.Mesh(new THREE.BoxGeometry(.1,.28,.1),m), armR=armL.clone(); armL.position.set(-.23,.58,0); armR.position.set(.23,.58,0);
    const handL=new THREE.Mesh(new THREE.SphereGeometry(.05,6,5),m), handR=handL.clone(); handL.position.set(-.23,.43,.02);handR.position.set(.23,.43,.02);
    g.add(torso,head,helm,pack,legL,legR,bootL,bootR,armL,armR,handL,handR);
    if(type==='kneel'){ legL.scale.y=.6; legL.position.y=.15; torso.position.y=.43; head.position.y=.72; helm.position.y=.8; }
    const weaponMat=this.mat('weapon',0x3b523b);
    let w;
    if(type==='sword'){ w=new THREE.Mesh(new THREE.BoxGeometry(.04,.5,.06),this.mat('blade',0xd0d9dc)); w.position.set(.3,.45,.1); const h=new THREE.Mesh(new THREE.BoxGeometry(.07,.05,.07),weaponMat); h.position.set(.3,.22,.1); g.add(w,h); }
    else if(type==='axe'){ const h=new THREE.Mesh(new THREE.CylinderGeometry(.03,.03,.52,6),weaponMat); h.position.set(.3,.35,.1); const a=new THREE.Mesh(new THREE.BoxGeometry(.22,.14,.05),this.mat('axeh',0xbdc7ca)); a.position.set(.36,.56,.1); g.add(h,a); }
    else if(type==='bazooka'){ w=new THREE.Mesh(new THREE.CylinderGeometry(.06,.07,.5,8),weaponMat); w.rotation.z=Math.PI/2; w.position.set(.18,.58,.15); g.add(w); }
    else { w=new THREE.Mesh(new THREE.BoxGeometry(.05,.35,.06),weaponMat); w.rotation.z=Math.PI/2; w.position.set(.18,.54,.13); g.add(w); }
    return g;
  }
}

class Enemy { constructor(type,pos,scene){ this.type=type; this.group=SoldierBuilder.build(type); this.group.position.copy(pos); scene.add(this.group); this.dead=false; this.fireDeath=false; this.melting=0; this.flash=0;
  this.hp={rifle:22,kneel:20,bazooka:28,sword:26,axe:35,tank:220}[type]||20; this.speed={rifle:4,kneel:3.2,bazooka:2.8,sword:6.5,axe:4.8,tank:1.8}[type]||4; this.range={rifle:16,kneel:18,bazooka:24,sword:2.2,axe:2.4,tank:30}[type]||12; this.cd=Math.random()*1.5; }
  takeDamage(d,fire=false){ if(this.dead)return; this.hp-=d; this.flash=.08; if(fire && this.type!=='tank') this.fireDeath=true; if(this.hp<=0){ if(this.fireDeath){this.melting=1.3;} else this.dead=true; } }
  update(dt,snake,arr,projectiles,effects,snd){ if(this.dead)return; if(this.melting>0){ this.melting-=dt; this.group.scale.y=Math.max(.08,this.group.scale.y-dt*.9); this.group.scale.x+=dt*.2; this.group.scale.z+=dt*.2; this.group.position.y=Math.max(.03,this.group.position.y-dt*.5); this.group.traverse(o=>{if(o.material){o.material.color.setHex(0x2f5a2f);o.material.roughness=.15; o.material.metalness=.25;}}); if(Math.random()<8*dt)effects.spawn(this.group.position.clone(),0x777777,1,.09,.4); if(this.melting<=0)this.dead=true; return; }
    const to=snake.head.position.clone().sub(this.group.position); const dist=to.length(); to.normalize(); this.group.lookAt(snake.head.position.x,this.group.position.y,snake.head.position.z);
    const sep=new THREE.Vector3(); for(const e of arr){ if(e===this||e.dead)continue; const d=this.group.position.distanceTo(e.group.position); if(d<.9){ const push=this.group.position.clone().sub(e.group.position).normalize().multiplyScalar((.9-d)*1.6); sep.add(push);} }
    if(['sword','axe'].includes(this.type)){ if(dist>1.3) this.group.position.addScaledVector(to,this.speed*dt); if(dist<this.range&&this.cd<=0){ snake.hit(this.type==='sword'?8:13); this.cd=.65; snd.damage(); }}
    else { const ideal=this.range; const mv=(dist>ideal+1)?1:(dist<ideal-2?-1:0); this.group.position.addScaledVector(to,mv*this.speed*dt); if(this.cd<=0&&dist<this.range+3){ this.shoot(snake,projectiles,snd,effects); this.cd=this.type==='tank'?2.5:this.type==='bazooka'?2.1:this.type==='kneel'?1.2:1.0; }}
    this.group.position.addScaledVector(sep,dt);
    this.cd-=dt;
    if(this.flash>0){this.flash-=dt; this.group.traverse(o=>{if(o.material) o.material.emissive=new THREE.Color(0x223322);});} else { this.group.traverse(o=>{if(o.material) o.material.emissive=new THREE.Color(0x000000);}); }
  }
  shoot(snake,projectiles,snd,effects){ const p=this.group.position.clone().add(new THREE.Vector3(0,.6,0)); const dir=snake.head.position.clone().sub(p).normalize(); const kind=this.type==='tank'?'shell':this.type==='bazooka'?'rocket':'bullet'; projectiles.push(new Projectile(kind,p,dir)); effects.spawn(p,0xffcc66,2,.08,.2); if(kind==='bullet')snd.shoot(); else if(kind==='rocket')snd.rocket(); else snd.cannon(); }
}
class Projectile { constructor(kind,p,d){ this.kind=kind; this.pos=p.clone(); this.dir=d.clone(); this.life=0; this.max={bullet:2.5,rocket:4,shell:4}[kind]; this.speed={bullet:26,rocket:14,shell:16}[kind]; this.dmg={bullet:4,rocket:18,shell:24}[kind]; this.mesh=new THREE.Mesh(new THREE.SphereGeometry(kind==='bullet'?.06:.12,7,6),new THREE.MeshStandardMaterial({color:kind==='bullet'?0xc8ffb0:kind==='rocket'?0xff8844:0xffcc77,emissive:kind==='bullet'?0x223311:0x552200,emissiveIntensity:.7})); this.mesh.position.copy(this.pos); }
  update(dt){ this.life+=dt; this.pos.addScaledVector(this.dir,this.speed*dt); this.mesh.position.copy(this.pos); return this.life<this.max; }
}

class Snake { constructor(scene){ this.scene=scene; this.group=new THREE.Group(); this.body=[]; this.maxHealth=400; this.health=400; this.inf=false; this.pos=new THREE.Vector3(0,1.2,0); this.yaw=0; this.speedBurst=0; this.biteT=0; this.fireCd=0; this.fireActive=0; this.score=0;
    const skin=new THREE.MeshStandardMaterial({color:0x5a8f49,roughness:.55,metalness:.1});
    this.head=new THREE.Group(); const skull=new THREE.Mesh(new THREE.SphereGeometry(1.2,18,14),skin); skull.scale.set(1.4,1.0,1.8);
    const jaw=new THREE.Mesh(new THREE.BoxGeometry(1.3,.35,1.2),new THREE.MeshStandardMaterial({color:0x4d7b3f})); jaw.position.set(0,-.55,1.1); this.lowerJaw=jaw;
    const mouthIn=new THREE.Mesh(new THREE.BoxGeometry(1.05,.2,.95),new THREE.MeshStandardMaterial({color:0x1b1b1b})); mouthIn.position.set(0,-.42,1.05);
    const eyeMat=new THREE.MeshStandardMaterial({color:0xffffff,roughness:.08,metalness:.35}); const pupMat=new THREE.MeshStandardMaterial({color:0x151515});
    const eyeL=new THREE.Mesh(new THREE.SphereGeometry(.18,10,8),eyeMat), eyeR=eyeL.clone(); eyeL.position.set(-.42,.38,1.2); eyeR.position.set(.42,.38,1.2);
    const puL=new THREE.Mesh(new THREE.SphereGeometry(.07,8,7),pupMat), puR=puL.clone(); puL.position.set(-.42,.36,1.36); puR.position.set(.42,.36,1.36);
    const fangMat=new THREE.MeshStandardMaterial({color:0xf3f1dc,roughness:.15,metalness:.05});
    const f1=new THREE.Mesh(new THREE.ConeGeometry(.07,.55,10),fangMat),f2=f1.clone(); f1.position.set(-.24,-.33,1.5);f2.position.set(.24,-.33,1.5); f1.rotation.x=Math.PI; f2.rotation.x=Math.PI; f1.rotation.z=.2; f2.rotation.z=-.2;
    this.head.add(skull,jaw,mouthIn,eyeL,eyeR,puL,puR,f1,f2); this.head.position.copy(this.pos); this.group.add(this.head);
    for(let i=0;i<22;i++){ const seg=new THREE.Mesh(new THREE.SphereGeometry(Math.max(.28,1-.03*i),12,10),skin); seg.position.set(0,1,-i*.9); this.group.add(seg); this.body.push(seg); }
    scene.add(this.group);
  }
  hit(d){ if(!this.inf) this.health=Math.max(0,this.health-d); }
  update(dt,input,bounds){ const turn=((input.left?-1:0)+(input.right?1:0))*2.2; this.yaw+=turn*dt; let speed=8; if(input.boost&&this.speedBurst<=0){ speed=13; this.speedBurst=4.5; } if(this.speedBurst>0)this.speedBurst-=dt;
    const dir=new THREE.Vector3(Math.sin(this.yaw),0,Math.cos(this.yaw)); this.pos.addScaledVector(dir,speed*dt*((input.up?1:0)+(input.down?-0.7:0)||1)); this.pos.x=Math.max(-bounds,Math.min(bounds,this.pos.x)); this.pos.z=Math.max(-bounds,Math.min(bounds,this.pos.z));
    this.biteT=Math.max(0,this.biteT-dt); this.fireCd=Math.max(0,this.fireCd-dt); this.fireActive=Math.max(0,this.fireActive-dt);
    const sway=Math.sin(performance.now()*0.004)*.18; this.head.position.lerp(this.pos.clone().add(new THREE.Vector3(0,0,0)),.22); this.head.rotation.y=this.yaw+sway;
    const lunge=this.biteT>0?Math.sin((1-this.biteT/.25)*Math.PI)*1.4:0; this.head.position.add(dir.clone().multiplyScalar(lunge)); this.lowerJaw.rotation.x=this.biteT>0?0.45:0;
    let target=this.head.position.clone(); for(let i=0;i<this.body.length;i++){ const b=this.body[i]; const off=dir.clone().multiplyScalar(-(i+1)*.85); const wave=new THREE.Vector3(Math.sin(performance.now()*0.003-i*.4)*.26,0,Math.cos(performance.now()*0.003-i*.4)*.18); const desired=this.pos.clone().add(off).add(wave); b.position.lerp(desired,.24); b.position.y=1-.01*i; b.rotation.y=this.yaw + Math.sin(i*.25+performance.now()*0.002)*.1; }
  }
  bite(){ if(this.biteT<=0){ this.biteT=.25; return true;} return false; }
  fire(){ if(this.fireCd<=0){ this.fireCd=2.4; this.fireActive=.45; return true;} return false; }
  mouthPos(){ const d=new THREE.Vector3(Math.sin(this.yaw),0,Math.cos(this.yaw)); return this.head.position.clone().add(d.multiplyScalar(1.7)).add(new THREE.Vector3(0,-.2,0)); }
}

class WaveManager{ constructor(){this.wave=0;} next(){ this.wave++; const w=this.wave; const list=[]; const push=(t,n)=>{for(let i=0;i<n;i++)list.push(t)};
  if(w===1)push('rifle',15); else if(w===2){push('rifle',20);push('sword',5);} else if(w===3){push('rifle',25);push('sword',8);push('axe',5);} else if(w===4){push('rifle',30);push('sword',8);push('axe',5);push('bazooka',4);} else {push('rifle',28+w*2);push('sword',10+Math.floor(w*1.2));push('axe',7+Math.floor(w*.8));push('bazooka',6+Math.floor(w*.7));push('kneel',8+Math.floor(w*.8));push('tank',2+Math.floor(w/2));}
  return list;
}}

class Game{ constructor(){ this.scene=new THREE.Scene(); this.scene.background=new THREE.Color(0x8ec4ff); this.scene.fog=new THREE.Fog(0x9ac9ff,80,250); this.camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,500);
    this.renderer=new THREE.WebGLRenderer({antialias:true}); this.renderer.setSize(innerWidth,innerHeight); this.renderer.shadowMap.enabled=true; document.body.appendChild(this.renderer.domElement);
    addEventListener('resize',()=>{this.camera.aspect=innerWidth/innerHeight;this.camera.updateProjectionMatrix();this.renderer.setSize(innerWidth,innerHeight)});
    const hemi=new THREE.HemisphereLight(0xddeeff,0x556644,.85), sun=new THREE.DirectionalLight(0xffffff,1.0); sun.position.set(40,80,20); sun.castShadow=true; this.scene.add(hemi,sun);
    this.sound=new SoundManager(); this.effects=new Effects(this.scene); this.waveMgr=new WaveManager(); this.bounds=95;
    this.input={up:false,down:false,left:false,right:false,boost:false}; this.enemies=[]; this.projectiles=[]; this.gameOver=false; this.waveDelay=0; this.msgT=0;
    this.snake=new Snake(this.scene); this.makeMap(); this.bind(); this.spawnWave(); this.last=performance.now(); requestAnimationFrame(this.loop.bind(this)); }
  makeMap(){ const ground=new THREE.Mesh(new THREE.PlaneGeometry(220,220,1,1),new THREE.MeshStandardMaterial({color:0xc8ae72,roughness:.95})); ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; this.scene.add(ground);
    for(let i=0;i<180;i++){ const g=new THREE.Mesh(new THREE.CircleGeometry(.8+Math.random()*2.5,6),new THREE.MeshStandardMaterial({color:Math.random()<.5?0x6ea75d:0x7fb867,side:THREE.DoubleSide})); g.rotation.x=-Math.PI/2; g.position.set((Math.random()-.5)*190,.02,(Math.random()-.5)*190); this.scene.add(g);}
    const decoMat=[0x9f8f78,0xaa5a4a,0x8f7a65,0x7f5b36]; for(let i=0;i<120;i++){ const t=Math.random(); let m; if(t<.25)m=new THREE.Mesh(new THREE.BoxGeometry(2+Math.random()*2,1+Math.random(),2+Math.random()*2),new THREE.MeshStandardMaterial({color:0xcc5648})); else if(t<.5)m=new THREE.Mesh(new THREE.DodecahedronGeometry(.8+Math.random()*1.2),new THREE.MeshStandardMaterial({color:0x9a927f})); else if(t<.75)m=new THREE.Mesh(new THREE.CylinderGeometry(.15,.2,2+Math.random()*2,6),new THREE.MeshStandardMaterial({color:0x7e5c35})); else m=new THREE.Mesh(new THREE.BoxGeometry(1.2,.6,4),new THREE.MeshStandardMaterial({color:0x5d9f6b})); m.position.set((Math.random()-.5)*180,.3+(m.geometry.parameters.height||.6)/2,(Math.random()-.5)*180); m.rotation.y=Math.random()*Math.PI; this.scene.add(m);} 
    const borderMat=new THREE.MeshStandardMaterial({color:0xdbbf87}); for(let i=0;i<4;i++){ const w=i<2?200:4, d=i<2?4:200; const b=new THREE.Mesh(new THREE.BoxGeometry(w,2,d),borderMat); b.position.set(i===2?-100:i===3?100:0,1,i===0?-100:i===1?100:0); this.scene.add(b);} 
    const mound=new THREE.Mesh(new THREE.ConeGeometry(8,5,20),new THREE.MeshStandardMaterial({color:0x8f6b4d})); mound.position.set(45,2.5,-50); this.scene.add(mound);
  }
  bind(){ addEventListener('keydown',e=>{ this.sound.init(); const k=e.key.toLowerCase(); if(['w','arrowup'].includes(k))this.input.up=true; if(['s','arrowdown'].includes(k))this.input.down=true; if(['a','arrowleft'].includes(k))this.input.left=true; if(['d','arrowright'].includes(k))this.input.right=true; if(k==='shift')this.input.boost=true;
      if(k===' '&&!this.gameOver&&this.snake.bite()){ this.sound.bite(); this.effects.spawn(this.snake.mouthPos(),0xbca678,8,.12,.45); }
      if(k==='f'&&!this.gameOver&&this.snake.fire()){ this.sound.fire(); }
      if(k==='h'){ this.snake.inf=!this.snake.inf; this.sound.toggle(); }
      if(k==='m'){ this.sound.toggleMute(); }
      if(k==='r'&&this.gameOver){ location.reload(); }
    });
    addEventListener('keyup',e=>{ const k=e.key.toLowerCase(); if(['w','arrowup'].includes(k))this.input.up=false; if(['s','arrowdown'].includes(k))this.input.down=false; if(['a','arrowleft'].includes(k))this.input.left=false; if(['d','arrowright'].includes(k))this.input.right=false; if(k==='shift')this.input.boost=false; }); }
  spawnWave(){ const types=this.waveMgr.next(); const spawnAt=()=>{ const side=Math.floor(Math.random()*4), r=90; return new THREE.Vector3(side===0?-r:side===1?r:(Math.random()-.5)*180,.1,side===2?-r:side===3?r:(Math.random()-.5)*180);};
    for(const t of types) this.enemies.push(new Enemy(t,spawnAt(),this.scene)); this.msg('WAVE '+this.waveMgr.wave); this.sound.wave(); }
  msg(s){ const el=document.getElementById('waveMsg'); el.textContent=s; this.msgT=2.2; }
  update(dt){ if(this.gameOver)return; this.snake.update(dt,this.input,this.bounds);
    if(this.snake.fireActive>0){ const m=this.snake.mouthPos(); const dir=new THREE.Vector3(Math.sin(this.snake.yaw),0,Math.cos(this.snake.yaw)); this.effects.spawn(m.clone().add(dir.clone().multiplyScalar(1.2)),0xff8822,7,.16,.45); this.sound.fire();
      for(const e of this.enemies){ if(e.dead)continue; const to=e.group.position.clone().sub(m); const dist=to.length(); const ang=dir.angleTo(to.normalize()); if(dist<14&&ang<.45){ e.takeDamage(e.type==='tank'?18*dt:75*dt,true); } }
    }
    const mouth=this.snake.mouthPos();
    for(const e of this.enemies){ if(e.dead)continue; e.update(dt,this.snake,this.enemies,this.projectiles,this.effects,this.sound);
      const dist=e.group.position.distanceTo(mouth);
      if(this.snake.biteT>0 && dist<2.8 && e.type!=='tank'){ e.dead=true; this.snake.score+=10; this.snake.health=Math.min(this.snake.maxHealth,this.snake.health+8); this.sound.gulp(); this.effects.spawn(mouth,0x88ff66,8,.1,.45); }
      if(this.snake.biteT>0 && dist<3.5 && e.type==='tank'){ e.takeDamage(45,false); }
      for(const b of this.snake.body){ if(e.dead)break; if(e.group.position.distanceTo(b.position)<(e.type==='tank'?1.2:.75)){ e.takeDamage(e.type==='tank'?45:999,false); if(e.type!=='tank'){ this.snake.score+=5; this.effects.spawn(e.group.position,0x66cc66,10,.11,.45);} } }
    }
    for(let i=this.projectiles.length-1;i>=0;i--){ const p=this.projectiles[i]; if(!p.mesh.parent)this.scene.add(p.mesh); const alive=p.update(dt); if(!alive){ this.scene.remove(p.mesh); this.projectiles.splice(i,1); continue; }
      if(p.pos.distanceTo(this.snake.head.position)<1.3){ this.snake.hit(p.dmg); this.sound.damage(); this.effects.spawn(p.pos,p.kind==='bullet'?0xffff99:0xff8844,8,.12,.4); if(p.kind!=='bullet')this.sound.explosion(); this.scene.remove(p.mesh); this.projectiles.splice(i,1);} }
    for(let i=this.enemies.length-1;i>=0;i--){ const e=this.enemies[i]; if(e.dead){ this.scene.remove(e.group); this.enemies.splice(i,1); if(e.fireDeath) this.sound.melt(); }}
    this.effects.update(dt); this.updateCamera(dt); this.updateHUD();
    if(!this.snake.inf&&this.snake.health<=0){ this.gameOver=true; document.getElementById('over').style.display='grid'; this.sound.over(); }
    if(this.enemies.length===0){ this.waveDelay+=dt; if(this.waveDelay>.9){ this.msg('Wave Complete'); } if(this.waveDelay>2.4){ this.waveDelay=0; this.spawnWave(); } }
    if(this.msgT>0){ this.msgT-=dt; if(this.msgT<=0)document.getElementById('waveMsg').textContent=''; }
  }
  updateCamera(dt){ const head=this.snake.head.position.clone(); const dir=new THREE.Vector3(Math.sin(this.snake.yaw),0,Math.cos(this.snake.yaw)); const side=new THREE.Vector3(dir.z,0,-dir.x); const tgt=head.clone().add(dir.clone().multiplyScalar(-11)).add(side.multiplyScalar(5)).add(new THREE.Vector3(0,8,0)); this.camera.position.lerp(tgt,.08); this.camera.lookAt(head.clone().add(new THREE.Vector3(0,.35,1.4))); }
  updateHUD(){ document.getElementById('hud').innerHTML=`<b>Garden Titan: Snake vs. Plastic Army Men</b><br>
  Health: ${this.snake.health.toFixed(0)} / ${this.snake.maxHealth}<br>
  Wave: ${this.waveMgr.wave}<br>
  Score: ${this.snake.score}<br>
  Enemies Remaining: ${this.enemies.length}<br>
  Fire Cooldown: ${this.snake.fireCd.toFixed(1)}s<br>
  Speed Burst Cooldown: ${Math.max(0,this.snake.speedBurst).toFixed(1)}s<br>
  <span style="color:${this.snake.inf?'#8f8':'#f88'};font-weight:bold;">INFINITE HEALTH: ${this.snake.inf?'ON':'OFF'}</span><br>
  Sound: ${this.sound.muted?'MUTED':'UNMUTED'}<hr style="border-color:#5f73">
  Controls: WASD/Arrows move, Space bite, F fire, Shift burst, H infinite health, M mute, R restart`; }
  loop(t){ const dt=Math.min(.033,(t-this.last)/1000); this.last=t; this.update(dt); this.renderer.render(this.scene,this.camera); requestAnimationFrame(this.loop.bind(this)); }
}
new Game();
</script>
